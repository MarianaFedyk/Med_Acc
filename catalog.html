<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAcc</title>
    <link rel="stylesheet" href="style/catalog.css">
    <link rel="stylesheet" href="style/index.css">

    <link href="https://fonts.googleapis.com/css2?family=Marmelad&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
    <div class="logo">
        <img src="data/pharma.png">
        <a href="index.html">MedAcc</a>
    </div>

    <div class="user">
        <a href="LogIn.html"><img id="userIcon" src="data/log-in.png" alt="Користувач">  </a>
    </div>
</header>

<main class="container">

    <aside class="sidebar">
        <p id="tittle">Каталог</p>

        <p class="price-title">Ціна</p>
        <div class="price-range">
            <span id="minPrice">0</span>
            <span>2500</span>
        </div>
        <input type="range" id="priceRange" min="0" value="300">

        <div class="categories" id="categories">
        </div>
    </aside>

    <section class="content">
        <div class="search">
        <input type="text" id="searchInput" placeholder="Назва лікарського засобу">
        <button id="searchBtn">
        <img src="data/search.png" alt="">
        </button>
</div>
        <div class="products" id="products"></div>
        <button id="loadMoreBtn">Ще</button>
    </section>

</main>

<script src="JavaScript/catalog.js"></script>

</body>
</html>
