<h1>MedAcc</h1>

<div class="login-box">

<h2>Реєстрація</h2>

<input type="text" id="login" placeholder="Логін" required>

<input type="password" id="password" minlength="8" placeholder="Пароль" required>

<a href="LogIn.html">Вже зареєстровані? Увійти</a>

</form>

</div>
