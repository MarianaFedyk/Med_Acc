<h1>MedAcc</h1>

<div class="login-box">

<h2>Вхід</h2>

<form id="loginForm" >

    <input type="text" id="login" placeholder="Логін" required>
    <label for="password">Пароль</label>
    <input type="password" id="password" minlength="8" placeholder="Пароль" required>
    <button type="submit">Увійти</button>
    <a href="SignIn.html">Зареєструватися</a>
</form>
<p id="error" style="color:red;"></p>

</div>
